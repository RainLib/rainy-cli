name: security

on:
  pull_request:
    paths: ["Cargo.toml", "Cargo.lock", "deny.toml", ".github/workflows/security.yml"]
  push:
    branches: [main]
    paths: ["Cargo.toml", "Cargo.lock", "deny.toml", ".github/workflows/security.yml"]
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  RUSTUP_TOOLCHAIN: stable

jobs:
  dependencies:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cargo/bin
          key: security-tools-cargo-audit-0.22.2-cargo-deny-0.19.4
      - name: Install security tools
        run: |
          command -v cargo-audit >/dev/null || cargo install cargo-audit --version 0.22.2 --locked
          command -v cargo-deny >/dev/null || cargo install cargo-deny --version 0.19.4 --locked
      - run: cargo audit
      - run: cargo deny check

  codeql:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: github/codeql-action/init@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          languages: rust
      - uses: github/codeql-action/analyze@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
