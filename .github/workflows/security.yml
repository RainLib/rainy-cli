name: security

on:
  pull_request:
    paths: ["Cargo.toml", "Cargo.lock", "deny.toml", ".github/workflows/security.yml"]
  push:
    branches: [main]
    paths: ["Cargo.toml", "Cargo.lock", "deny.toml", ".github/workflows/security.yml"]
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  RUSTUP_TOOLCHAIN: stable

jobs:
  dependencies:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cargo/bin
          key: security-tools-cargo-audit-0.21-cargo-deny-0.18
      - name: Install security tools
        run: |
          command -v cargo-audit >/dev/null || cargo install cargo-audit --version 0.21.2 --locked
          command -v cargo-deny >/dev/null || cargo install cargo-deny --version 0.18.4 --locked
      - run: cargo audit
      - run: cargo deny check

  codeql:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - uses: github/codeql-action/init@641a925cfafe92d0fdf8b239ba4053e3f8d99d6d # v3
        with:
          languages: rust
      - uses: github/codeql-action/analyze@641a925cfafe92d0fdf8b239ba4053e3f8d99d6d # v3
