name: release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: Existing release tag in vX.Y.Z form
        required: true
        type: string

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTUP_TOOLCHAIN: stable
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}

jobs:
  verify:
    name: verify release inputs
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      release_tag: ${{ steps.version.outputs.release_tag }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ env.RELEASE_TAG }}
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          components: rustfmt, clippy
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: release-verify-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
      - name: Validate release version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          sh scripts/check-release-version.sh "$RELEASE_TAG"
          echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
      - name: Format
        run: cargo fmt --check
      - name: Test
        run: cargo test --workspace --locked
      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings
      - name: Schema parse
        run: python3 -c "import json, pathlib; [json.loads(path.read_text()) for path in sorted(pathlib.Path('schemas').glob('*.schema.json'))]"
      - name: MCP wrapper syntax
        run: python3 -m py_compile integrations/mcp/rainy_mcp.py
      - name: Skill and installer tests
        shell: bash
        run: make skill-check installer-check installer-test mirror-test
      - name: Release input tests
        run: sh scripts/test-release.sh

  build:
    name: build ${{ matrix.target }}
    needs: verify
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
            binary: rainy
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            archive: tar.gz
            binary: rainy
          - os: macos-26-intel
            target: x86_64-apple-darwin
            archive: tar.gz
            binary: rainy
          - os: macos-26
            target: aarch64-apple-darwin
            archive: tar.gz
            binary: rainy
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
            binary: rainy.exe
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.verify.outputs.release_tag }}
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          targets: ${{ matrix.target }}
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: release-${{ matrix.target }}-${{ hashFiles('Cargo.lock') }}
      - name: Build release binary
        run: cargo build --locked --release --target ${{ matrix.target }} --bin rainy
      - name: Smoke release binary
        shell: bash
        env:
          RAINY_FORCE_EMBEDDED_ASSETS: "1"
        run: |
          set -euo pipefail
          binary="target/${{ matrix.target }}/release/${{ matrix.binary }}"
          "$binary" --version | grep -F " ${RELEASE_TAG#v}"
          "$binary" capability list --json >/dev/null
          "$binary" schema list --json >/dev/null
          "$binary" --workspace "$RUNNER_TEMP" new release-smoke --dry-run --json >/dev/null
      - name: Test Windows installer and Skill bootstrap
        if: matrix.target == 'x86_64-pc-windows-msvc'
        shell: pwsh
        env:
          RAINY_TEST_BINARY: target/${{ matrix.target }}/release/${{ matrix.binary }}
        run: |
          ./scripts/test-install.ps1
          ./scripts/test-skill.ps1
      - name: Package Unix binary
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" rainy
          tar -czf "dist/rainy-${{ matrix.target }}.tar.gz" rainy
          if command -v sha256sum >/dev/null 2>&1; then
            (cd dist && sha256sum "rainy-${{ matrix.target }}.tar.gz" > "rainy-${{ matrix.target }}.tar.gz.sha256")
          else
            (cd dist && shasum -a 256 "rainy-${{ matrix.target }}.tar.gz" > "rainy-${{ matrix.target }}.tar.gz.sha256")
          fi
      - name: Package Windows binary
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.binary }}" rainy.exe
          Compress-Archive -Path rainy.exe -DestinationPath "dist/rainy-${{ matrix.target }}.zip"
          $hash = (Get-FileHash -Algorithm SHA256 "dist/rainy-${{ matrix.target }}.zip").Hash.ToLowerInvariant()
          "$hash  rainy-${{ matrix.target }}.zip" | Out-File -NoNewline -Encoding ascii "dist/rainy-${{ matrix.target }}.zip.sha256"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: rainy-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error

  publish:
    name: publish release
    needs: [verify, build]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.verify.outputs.release_tag }}
          persist-credentials: false
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
          merge-multiple: true
      - name: Add and verify installer assets
        shell: bash
        run: |
          set -euo pipefail
          cp scripts/install.sh scripts/install.ps1 dist/
          printf '%s\n' "$RELEASE_TAG" > dist/latest.txt
          (cd dist && sha256sum install.sh install.ps1 > installers.sha256)
          tar -czf dist/rainy-cli-skill.tar.gz -C integrations/skills rainy-cli
          tar -czf dist/rainy-comet-skill.tar.gz -C integrations/skills rainy-comet
          python3 - <<'PY'
          from pathlib import Path
          from zipfile import ZIP_DEFLATED, ZipFile

          for name in ("rainy-cli", "rainy-comet"):
              source = Path("integrations/skills") / name
              with ZipFile(f"dist/{name}-skill.zip", "w", ZIP_DEFLATED) as archive:
                  for path in sorted(source.rglob("*")):
                      if path.is_file():
                          archive.write(path, Path(name) / path.relative_to(source))
          PY
          (cd dist && sha256sum rainy-cli-skill.tar.gz > rainy-cli-skill.tar.gz.sha256)
          (cd dist && sha256sum rainy-cli-skill.zip > rainy-cli-skill.zip.sha256)
          (cd dist && sha256sum rainy-comet-skill.tar.gz > rainy-comet-skill.tar.gz.sha256)
          (cd dist && sha256sum rainy-comet-skill.zip > rainy-comet-skill.zip.sha256)
          expected_assets=(
            rainy-x86_64-unknown-linux-gnu.tar.gz
            rainy-aarch64-unknown-linux-gnu.tar.gz
            rainy-x86_64-apple-darwin.tar.gz
            rainy-aarch64-apple-darwin.tar.gz
            rainy-x86_64-pc-windows-msvc.zip
            rainy-cli-skill.tar.gz
            rainy-cli-skill.zip
            rainy-comet-skill.tar.gz
            rainy-comet-skill.zip
          )
          for asset in "${expected_assets[@]}"; do
            test -s "dist/$asset"
            test -s "dist/$asset.sha256"
            (cd dist && sha256sum -c "$asset.sha256")
          done
      - uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          path: .
          format: spdx-json
          output-file: dist/rainy-cli.spdx.json
          upload-artifact: false
      - uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: dist/*
      - uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          tag_name: ${{ needs.verify.outputs.release_tag }}
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true
