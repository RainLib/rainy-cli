name: release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  verify:
    name: verify release inputs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Format
        run: cargo fmt --check
      - name: Test
        run: cargo test --workspace
      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: Schema parse
        run: python3 -c "import json, pathlib; [json.loads(path.read_text()) for path in sorted(pathlib.Path('schemas').glob('*.schema.json'))]"
      - name: MCP wrapper syntax
        run: python3 -m py_compile integrations/mcp/rainy_mcp.py
      - name: Installer syntax
        run: |
          sh -n scripts/install.sh
          sh -n scripts/test-install.sh
          if command -v pwsh >/dev/null 2>&1; then
            pwsh -NoProfile -Command '$null = [System.Management.Automation.PSParser]::Tokenize((Get-Content -Raw scripts/install.ps1), [ref]$null)'
          else
            echo 'pwsh not found; skipping install.ps1 syntax check'
          fi
      - name: Installer tests
        run: sh scripts/test-install.sh

  build:
    name: build ${{ matrix.target }}
    needs: verify
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
            binary: rainy
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            archive: tar.gz
            binary: rainy
          - os: macos-13
            target: x86_64-apple-darwin
            archive: tar.gz
            binary: rainy
          - os: macos-26
            target: aarch64-apple-darwin
            archive: tar.gz
            binary: rainy
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
            binary: rainy.exe

    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} --bin rainy
      - name: Package Unix binary
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" rainy
          tar -czf "dist/rainy-${{ matrix.target }}.tar.gz" rainy
          if command -v sha256sum >/dev/null 2>&1; then
            (cd dist && sha256sum "rainy-${{ matrix.target }}.tar.gz" > "rainy-${{ matrix.target }}.tar.gz.sha256")
          else
            (cd dist && shasum -a 256 "rainy-${{ matrix.target }}.tar.gz" > "rainy-${{ matrix.target }}.tar.gz.sha256")
          fi
      - name: Package Windows binary
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.binary }}" rainy.exe
          Compress-Archive -Path rainy.exe -DestinationPath "dist/rainy-${{ matrix.target }}.zip"
          $hash = (Get-FileHash -Algorithm SHA256 "dist/rainy-${{ matrix.target }}.zip").Hash.ToLowerInvariant()
          "$hash  rainy-${{ matrix.target }}.zip" | Out-File -NoNewline -Encoding ascii "dist/rainy-${{ matrix.target }}.zip.sha256"
      - uses: actions/upload-artifact@v4
        with:
          name: rainy-${{ matrix.target }}
          path: dist/*

  publish:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Add installer scripts
        run: |
          cp scripts/install.sh dist/install.sh
          cp scripts/install.ps1 dist/install.ps1
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
