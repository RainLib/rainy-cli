name: ci

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTUP_TOOLCHAIN: stable

jobs:
  quality:
    name: quality and e2e
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          components: rustfmt, clippy
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ci-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
      - run: make production-check

  native:
    name: native ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-26, windows-latest]
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: native-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
      - name: Native unit tests
        run: cargo test --workspace --bins --locked
      - name: Native CLI smoke
        shell: bash
        run: |
          cargo build --locked --bin rainy
          target/debug/rainy --version
          target/debug/rainy capability list --json >/dev/null
      - name: PowerShell installer test
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./scripts/test-install.ps1

  msrv:
    name: rust 1.88 MSRV
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      RUSTUP_TOOLCHAIN: 1.88.0
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: 1.88.0
      - run: cargo check --workspace --all-targets --locked
