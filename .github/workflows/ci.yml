name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Format
        run: cargo fmt --check
      - name: Test
        run: cargo test --workspace
      - name: E2E
        run: cargo test --workspace --test e2e
      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: Schema parse
        run: python3 -c "import json, pathlib; [json.loads(path.read_text()) for path in sorted(pathlib.Path('schemas').glob('*.schema.json'))]"
      - name: MCP wrapper syntax
        run: python3 -m py_compile integrations/mcp/rainy_mcp.py
      - name: Installer syntax
        run: |
          sh -n scripts/install.sh
          sh -n scripts/test-install.sh
          if command -v pwsh >/dev/null 2>&1; then
            pwsh -NoProfile -Command '$null = [System.Management.Automation.PSParser]::Tokenize((Get-Content -Raw scripts/install.ps1), [ref]$null)'
          else
            echo 'pwsh not found; skipping install.ps1 syntax check'
          fi
      - name: Installer tests
        run: sh scripts/test-install.sh
      - name: Capability JSON smoke
        run: cargo run -q --bin rainy -- capability list --json
      - name: Golden Path dry-run JSON smoke
        run: cargo run -q --bin rainy -- new demo-saas --golden-path spring-nextjs-saas --dry-run --json
      - name: Pack conformance
        run: cargo run -q --bin rainy -- conformance check --path community-packs --json
